<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ウェイトリスト登録（neo / Formspree）</title>

  <!-- フォント（neo 様式: 見出し Lexend / 本文 Geist / 等幅 JetBrains Mono） -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Lexend:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ============================================================
       Launchia 開発者 neo（ネオブルータリズム）トークン
       出典: launchia/app globals.css の --color-neo-* / brand.ts の NEO_CSS
       外部LPに置くため自己完結（変数・クラスをここに内蔵）
       ============================================================ */
    :root {
      --neo-bg: #fbf8fe;
      --neo-surface: #f6f2f8;
      --neo-card: #ffffff;
      --neo-fg: #1b1b1f;
      --neo-fg-soft: #464555;
      --neo-fg-faint: #767587;
      --neo-ink: #1b1b1f;        /* 極太枠・ハード影 */
      --neo-track: #e4e1e7;
      --neo-primary: #3f40e7;    /* 藍（主役） */
      --neo-on-primary: #ffffff;
      --neo-primary-strong: #5b5eff;
      --neo-primary-soft: #e1e0ff;
      --neo-on-primary-soft: #06006c;
      --neo-orange: #fb7800;     /* アクセント */
      --neo-on-orange-soft: #321200;
      --neo-orange-soft: #ffdbc8;
      --neo-green: #00845a;
      --neo-green-soft: #74fbbe;
      --neo-on-green-soft: #002113;
      --neo-danger: #ba1a1a;
      --neo-danger-soft: #ffdad6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      color: var(--neo-fg);
      background-color: var(--neo-bg);
      /* 薄いドットグリッド＋隅のカラーにじみ（neo の素地に空気感を足す） */
      background-image:
        radial-gradient(circle at 18% 12%, rgba(63, 64, 231, 0.10), transparent 42%),
        radial-gradient(circle at 86% 88%, rgba(251, 120, 0, 0.12), transparent 40%),
        radial-gradient(var(--neo-track) 1.2px, transparent 1.2px);
      background-size: auto, auto, 22px 22px;
      font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
    }

    /* --- タイポ（NEO_CSS 準拠） --- */
    .neo-display  { font-family:'Lexend',sans-serif; font-weight:800; letter-spacing:-0.02em; line-height:1.12; }
    .neo-label    { font-family:'Lexend',sans-serif; font-weight:600; }
    .neo-body     { font-family:'Geist',sans-serif;  font-weight:400; line-height:1.6; }
    .neo-code     { font-family:'JetBrains Mono',monospace; font-weight:500; }

    /* --- カード：極太枠＋ハード影（neo-card） --- */
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--neo-card);
      border: 3px solid var(--neo-ink);
      box-shadow: 8px 8px 0 0 var(--neo-ink);
      border-radius: 20px;
      padding: 30px 28px 26px;
      position: relative;
    }

    /* 上部のアクセント帯（eyebrow チップ） */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--neo-on-primary-soft);
      background: var(--neo-primary-soft);
      border: 2px solid var(--neo-ink);
      box-shadow: 3px 3px 0 0 var(--neo-ink);
      padding: 5px 10px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .eyebrow .dot {
      width: 9px; height: 9px; border-radius: 2px;
      background: var(--neo-orange);
      border: 1.5px solid var(--neo-ink);
    }

    h1.title {
      margin: 0 0 8px;
      font-size: clamp(26px, 6vw, 34px);
      color: var(--neo-fg);
    }
    .title .accent {
      background: linear-gradient(180deg, transparent 62%, var(--neo-orange-soft) 62%);
      padding: 0 2px;
    }
    p.lead {
      margin: 0 0 24px;
      font-size: 14.5px;
      color: var(--neo-fg-soft);
    }

    /* --- フォーム --- */
    .field { margin-bottom: 16px; }
    .field > label {
      display: block;
      font-family: 'Lexend', sans-serif;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 7px;
      color: var(--neo-fg);
    }
    .field .req { color: var(--neo-orange); margin-left: 3px; }

    .neo-input {
      font-family: 'Geist', sans-serif;
      font-size: 15px;
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--neo-ink);
      border-radius: 12px;
      background: var(--neo-card);
      color: var(--neo-fg);
      outline: none;
      transition: box-shadow .12s ease, border-color .12s ease;
    }
    textarea.neo-input { min-height: 96px; resize: vertical; }
    .neo-input:focus {
      border-color: var(--neo-primary);
      box-shadow: 3px 3px 0 0 var(--neo-primary);
    }
    .neo-input::placeholder { color: var(--neo-fg-faint); }

    /* --- ボタン：ハード影＋押し込み（neo-btn） --- */
    .neo-btn {
      font-family: 'Lexend', sans-serif;
      font-weight: 700;
      font-size: 15.5px;
      width: 100%;
      margin-top: 6px;
      padding: 13px 18px;
      color: var(--neo-on-primary);
      background: var(--neo-primary);
      border: 3px solid var(--neo-ink);
      border-radius: 12px;
      box-shadow: 4px 4px 0 0 var(--neo-ink);
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      cursor: pointer;
    }
    .neo-btn:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 0 var(--neo-ink);
      background: var(--neo-primary-strong);
    }
    .neo-btn:active:not(:disabled) {
      transform: translate(0, 0);
      box-shadow: 0 0 0 0 var(--neo-ink);
    }
    .neo-btn:disabled { opacity: .55; cursor: not-allowed; box-shadow: 4px 4px 0 0 var(--neo-ink); transform: none; }

    .foot {
      margin-top: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--neo-fg-faint);
      text-align: center;
    }

    /* エラー表示 */
    .err {
      display: none;
      margin-top: 12px;
      font-family: 'Geist', sans-serif;
      font-size: 13px;
      color: var(--neo-danger);
      background: var(--neo-danger-soft);
      border: 2px solid var(--neo-danger);
      border-radius: 10px;
      padding: 9px 12px;
    }
    .err.show { display: block; }

    /* 成功パネル（送信後に差し替え） */
    .success { display: none; text-align: center; padding: 8px 4px 4px; }
    .success.show { display: block; }
    .success .seal {
      width: 64px; height: 64px; margin: 4px auto 16px;
      display: grid; place-items: center;
      font-size: 30px;
      background: var(--neo-green-soft);
      color: var(--neo-on-green-soft);
      border: 3px solid var(--neo-ink);
      box-shadow: 4px 4px 0 0 var(--neo-ink);
      border-radius: 16px;
    }
    .success h2 { font-family:'Lexend',sans-serif; font-weight:800; margin: 0 0 8px; font-size: 22px; color: var(--neo-fg); }
    .success p { margin: 0; color: var(--neo-fg-soft); font-size: 14px; }

    /* 読み込み時のささやかな段階表示 */
    .reveal { opacity: 0; transform: translateY(10px); animation: rise .5s cubic-bezier(.2,.8,.2,1) forwards; }
    .d1 { animation-delay: .05s; } .d2 { animation-delay: .12s; } .d3 { animation-delay: .19s; }
    .d4 { animation-delay: .26s; } .d5 { animation-delay: .33s; }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) {
      .reveal { animation: none; opacity: 1; transform: none; }
      .neo-btn, .neo-input { transition: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- ▼ 入力フォーム -->
    <div id="formWrap">
      <span class="eyebrow reveal d1"><span class="dot"></span>Early Access</span>
      <h1 class="title neo-display reveal d2">先行リストに<span class="accent">参加する</span></h1>
      <p class="lead neo-body reveal d3">
        ローンチ時にいちばん先にお知らせします。メールとひとことを添えて送ってください。
      </p>

      <!--
        Formspree: action / method="POST" / 各 input の name は変更しないこと。
        装飾（class・ラベル文言・レイアウト）はすべて自由。
      -->
      <form id="wlForm" action="https://formspree.io/f/mgobzowl" method="POST">
        <div class="field reveal d4">
          <label for="email">メールアドレス<span class="req">*</span></label>
          <input class="neo-input" type="email" id="email" name="email"
                 placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="field reveal d4">
          <label for="message">ひとこと<span class="req">*</span></label>
          <textarea class="neo-input" id="message" name="message"
                    placeholder="期待していること・使いたい理由など" required></textarea>
        </div>

        <!-- スパム避け（人間には見えない。ボットが埋めると無視される） -->
        <input type="text" name="_gotcha" tabindex="-1" autocomplete="off"
               style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0" aria-hidden="true" />

        <button type="submit" class="neo-btn reveal d5">ウェイトリストに登録 →</button>

        <div id="err" class="err"></div>
      </form>

      <p class="foot reveal d5">// no spam — 解除はいつでも</p>
    </div>

    <!-- ▼ 送信成功（JS が差し替え表示） -->
    <div id="success" class="success">
      <div class="seal">✓</div>
      <h2>登録ありがとうございます！</h2>
      <p>ローンチが近づいたら、このメール宛にお知らせします。</p>
    </div>
  </div>

  <script>
    // AJAX 送信: ページ遷移せず neo の成功パネルに切り替える。
    // JS 無効時は通常の form POST（Formspree の既定完了ページ）にフォールバックする。
    (function () {
      var form = document.getElementById('wlForm');
      var err = document.getElementById('err');
      var formWrap = document.getElementById('formWrap');
      var success = document.getElementById('success');
      if (!form) return;

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var btn = form.querySelector('button[type="submit"]');
        var label = btn.textContent;
        err.classList.remove('show');
        btn.disabled = true;
        btn.textContent = '送信中…';
        try {
          var res = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { Accept: 'application/json' }
          });
          if (res.ok) {
            formWrap.style.display = 'none';
            success.classList.add('show');
            return;
          }
          var data = await res.json().catch(function () { return {}; });
          var msg = (data.errors && data.errors[0] && data.errors[0].message) || '送信に失敗しました。時間をおいて再度お試しください。';
          err.textContent = msg;
          err.classList.add('show');
        } catch (_) {
          err.textContent = 'ネットワークエラーが発生しました。';
          err.classList.add('show');
        }
        btn.disabled = false;
        btn.textContent = label;
      });
    })();
  </script>
</body>
</html>
